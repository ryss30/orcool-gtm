<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CUSP Wealth · Orcool</title>
<style>
  :root{
    --bg:#0a0a0c;
    --card:#141417;
    --border:#26262b;
    --text:#f2f2f0;
    --muted:#9a9aa3;
    --accent:#7c8cff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  header{
    display:flex;align-items:center;gap:12px;
    padding:28px 32px;
    border-bottom:1px solid var(--border);
  }
  header img{height:26px;}
  header span{color:var(--muted);font-size:14px;}
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:48px 32px 80px;
    display:none;
  }
  .wrap h1{font-size:26px;font-weight:600;margin-bottom:6px;}
  .wrap p.lead{color:var(--muted);font-size:15px;margin-bottom:36px;}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:24px;
    max-width:420px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
  }
  .card video{
    width:100%;
    aspect-ratio:9/16;
    display:block;
    background:#000;
  }
  .card .meta{padding:16px 18px;}
  .card .meta h3{font-size:15px;font-weight:600;margin-bottom:4px;}
  .card .meta p{font-size:13px;color:var(--muted);}
  footer{
    max-width:1100px;
    margin:0 auto;
    padding:32px;
    border-top:1px solid var(--border);
    color:var(--muted);
    font-size:13px;
  }
  footer a{color:var(--muted);}

  #gate{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  #gate .box{
    width:100%;
    max-width:360px;
    text-align:center;
  }
  #gate img{height:30px;margin-bottom:28px;}
  #gate h2{font-size:18px;font-weight:600;margin-bottom:8px;}
  #gate p{color:var(--muted);font-size:14px;margin-bottom:24px;}
  #gate input[type=password]{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    font-size:15px;
    margin-bottom:14px;
    outline:none;
  }
  #gate input[type=password]:focus{border-color:var(--accent);}
  #gate button{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:#0a0a0c;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
  }
  #gate button:hover{opacity:0.9;}
  #gate .err{color:#ff8080;font-size:13px;margin-top:12px;display:none;}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <img src="/orcool-logo.png" alt="Orcool">
    <h2>CUSP Wealth</h2>
    <p>This page is private. Enter the password to view the work.</p>
    <input type="password" id="pw" placeholder="Password">
    <button id="submit">View work</button>
    <div class="err" id="err">Wrong password, try again.</div>
  </div>
</div>

<header style="display:none" id="siteHeader">
  <img src="/orcool-logo.png" alt="Orcool">
  <span>Private client preview</span>
</header>

<div class="wrap" id="gallery">
  <h1>CUSP Wealth</h1>
  <p class="lead">Latest work, for internal review before client delivery.</p>
  <div class="grid">
    <div class="card">
      <video controls preload="metadata" playsinline src="CUSP-Wealth.mp4"></video>
      <div class="meta">
        <h3>CUSP Wealth</h3>
        <p>AI Adviser concept</p>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="https://orcool.com">orcool.com</a> · <a href="mailto:boris.ryss@orcool.com">boris.ryss@orcool.com</a>
</footer>

<script>
(function(){
  var STORED_HASH = "8112278ab77baed7611320af555577e69f7a3a5d6f9577a273ce31cc23171f47";
  var FLAG = "orcool_reel_unlocked_cusp";

  function reveal(){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('siteHeader').style.display = 'flex';
    document.getElementById('gallery').style.display = 'block';
  }

  if (sessionStorage.getItem(FLAG) === '1') {
    reveal();
    return;
  }

  async function hash(str){
    var enc = new TextEncoder().encode(str);
    var buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }

  var pw = document.getElementById('pw');
  var btn = document.getElementById('submit');
  var err = document.getElementById('err');

  async function tryUnlock(){
    var h = await hash(pw.value);
    if (h === STORED_HASH) {
      sessionStorage.setItem(FLAG, '1');
      reveal();
    } else {
      err.style.display = 'block';
    }
  }

  btn.addEventListener('click', tryUnlock);
  pw.addEventListener('keydown', function(e){
    if (e.key === 'Enter') tryUnlock();
  });
})();
</script>

</body>
</html>
