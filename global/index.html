<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script defer data-domain="get.orcool.com" src="https://plausible.io/js/script.js"></script>
<title>Orcool · Local winner. Found locally.</title>
<meta name="description" content="You have a creative team for the markets you know. For the other thirty, you have guesses. Orcool sources local signals, runs them through your brand taste, and finds the creative that holds.">
<meta property="og:url" content="https://get.orcool.com/global">
<meta property="og:title" content="Orcool · Local winner. Found locally.">
<meta property="og:description" content="For growth teams entering markets they don't know. Orcool finds the local winner from local signals.">
<meta property="og:image" content="https://get.orcool.com/og-image-global.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Orcool · Local winner. Found locally.">
<meta name="twitter:image" content="https://get.orcool.com/og-image-global.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f8f7f5; --ink:#443D3D; --black:#000000;
    --red:#FA3810; --blue:#387FFF; --green:#45B43B; --yellow:#FFB516;
    --grey:#6B6E80; --line:#E7E5E1; --panel:#FFFFFF;
    --sans:"Geist",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --mono:"Geist Mono",ui-monospace,Menlo,Consolas,monospace;
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px;margin:0 auto;padding:0 28px}
  a{color:inherit}
  h1{font-weight:800;letter-spacing:-.025em;line-height:1.02;font-size:46px}
  h2{font-weight:700;letter-spacing:-.015em;line-height:1.12;font-size:30px}
  h3{font-weight:600;font-size:18px}
  p{color:var(--ink);font-size:17px}
  .muted{color:var(--grey)}

  header{position:sticky;top:0;z-index:50;background:rgba(248,247,245,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:62px}
  .logo{height:22px;width:auto;display:block}
  .pill{display:inline-block;background:var(--ink);color:#fff;font-weight:600;font-size:14px;text-decoration:none;padding:9px 18px;border-radius:10px;transition:background-color .14s ease}
  .pill:hover{background:#332e2e}

  .btn{display:inline-block;background:var(--ink);color:#fff;font-weight:600;font-size:16px;text-decoration:none;padding:14px 26px;border-radius:10px;transition:background-color .14s ease,border-color .14s ease}
  .btn:hover{background:#332e2e}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid #D8D5D0}
  .btn.ghost:hover{border-color:var(--ink);background:rgba(68,61,61,.05)}
  .btn.light{background:#fff;color:#111}
  .btn.light:hover{background:#ededea}
  .btn.on-dark{background:var(--red);color:#fff}
  .btn.on-dark:hover{background:#d42e0b}
  .btn.on-dark.ghost{background:transparent;color:#fff;border:1.5px solid #3a3a3a}
  .btn.on-dark.ghost:hover{border-color:#5a5a5a;background:rgba(255,255,255,.07)}
  .btnrow{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .eyebrow{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--red)}

  section{padding:72px 0}

  /* hero */
  .hero{position:relative;text-align:center;padding:80px 0 100px;overflow:hidden}
  .hero .eyebrow{display:inline-block;margin-bottom:18px}
  .hero h1{max-width:800px;margin:0 auto 18px}
  .hero .sub{font-size:20px;color:var(--ink);max-width:580px;margin:0 auto 30px;line-height:1.55}
  .hero .micro{margin-top:18px;color:var(--grey);font-size:15px;line-height:1.7}
  .hero .micro b{color:var(--ink);font-weight:600}
  .glow{position:absolute;left:50%;transform:translateX(-50%);bottom:-120px;width:120%;height:320px;
    background:linear-gradient(135deg,var(--red),var(--yellow),var(--green),var(--blue));
    filter:blur(90px);opacity:.28;pointer-events:none;border-radius:50%;will-change:transform;backface-visibility:hidden}

  .loop{max-width:760px;margin:48px auto 0}
  .loopgrid{display:flex;align-items:flex-start;justify-content:center;gap:14px;flex-wrap:wrap}
  .li{display:flex;flex-direction:column;align-items:center;min-width:160px}
  .li .w{font-family:var(--serif);font-size:38px;line-height:1;color:var(--ink)}
  .li .a{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--red);margin-top:10px;text-align:center;max-width:160px;line-height:1.45}
  .arr{font-size:28px;line-height:40px;color:var(--blue);padding-top:4px}

  .dark{background:var(--black);color:#fff}
  .dark h2,.dark h3{color:#fff}
  .dark p{color:#C9C7C4}
  .dark .eyebrow{color:var(--yellow)}
  .center{text-align:center}
  .center .sub{max-width:560px;margin:14px auto 0}

  /* panels */
  .panels{display:grid;grid-template-columns:1fr;gap:18px;margin-top:40px;text-align:left}
  .panel{background:var(--panel);border-radius:16px;padding:26px;color:var(--ink);box-shadow:0 8px 30px rgba(0,0,0,.18);display:flex;flex-direction:column}
  .panel .tag{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
  .panel.blue .tag{color:var(--blue)}
  .panel.green .tag{color:var(--green)}
  .panel h3{margin-bottom:8px;color:var(--ink);line-height:1.3;min-height:47px}
  .panel p{font-size:15px;color:#5a5450}
  .panel .ship{margin-top:auto;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--grey);font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase}

  /* voice section */
  .pullquote{background:rgba(255,255,255,.05);border-left:3px solid var(--red);border-radius:0 10px 10px 0;padding:18px 22px;margin-top:28px;max-width:660px}
  .pullquote p{color:#fff;font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.55}
  .subnote{font-size:14px;color:#6e6c69;margin-top:12px;max-width:660px;line-height:1.6}

  /* voice ladder */
  .ladder-label{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--yellow);margin:36px 0 16px}
  .ladder{max-width:660px}
  .rung{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08);align-items:flex-start}
  .rung:last-child{border-bottom:none}
  .rung-num{flex:0 0 30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:#fff;margin-top:2px}
  .rung-body .rt{font-family:var(--mono);font-size:11px;color:var(--yellow);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
  .rung-body h4{font-size:16px;font-weight:600;color:#fff;margin-bottom:3px}
  .rung-body p{font-size:14px;color:#C9C7C4}
  .ladder-note{font-size:14px;color:#6e6c69;margin-top:20px;max-width:660px;line-height:1.6}

  /* how we work steps */
  .steps{counter-reset:s;margin-top:34px;max-width:700px}
  .step{display:flex;gap:18px;padding:16px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .step:last-child{border-bottom:none}
  .step .n{counter-increment:s;flex:0 0 34px;height:34px;border-radius:50%;background:var(--ink);color:#fff;font-weight:600;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--mono)}
  .step .n::before{content:counter(s,"decimal-leading-zero")}
  .step .t{font-family:var(--mono);font-size:11px;color:var(--red);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
  .step h4{font-size:17px;font-weight:600;margin-bottom:3px;color:var(--ink)}
  .step p{font-size:15px;color:#5a5450}

  /* compare boxes */
  .compare{display:grid;grid-template-columns:1fr;gap:16px;margin-top:34px}
  .cbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px}
  .cbox.lead{border:1.5px solid var(--ink)}
  .cbox .ct{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);margin-bottom:14px}
  .cbox.lead .ct{color:var(--red)}
  .cbox ul{list-style:none}
  .cbox li{padding:8px 0 8px 24px;position:relative;font-size:15px;color:#5a5450}
  .cbox li::before{content:"\2192";position:absolute;left:0;color:var(--blue);font-weight:700}
  .cbox.lead li::before{color:var(--green)}

  /* faq */
  .faq details{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin-top:12px;cursor:pointer}
  .faq summary{font-weight:600;font-size:17px;list-style:none;padding-right:28px;position:relative}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary::after{content:"+";position:absolute;right:0;top:0;color:var(--red);font-weight:600}
  .faq details[open] summary::after{content:"\2013"}
  .faq p{margin-top:12px;font-size:15px;color:#5a5450;line-height:1.6}

  /* final */
  .final{position:relative;text-align:center;overflow:hidden}
  .final .glow{opacity:.32;bottom:-150px}
  .final .sub{max-width:560px;margin:14px auto 0;color:#C9C7C4;font-size:18px}

  footer{border-top:1px solid var(--line);padding:34px 0;text-align:center;color:var(--grey);font-size:13px}
  footer .logo{height:20px;margin:0 auto 14px}
  footer .who{margin-top:8px;font-family:var(--mono);font-size:12px}

  @media(min-width:740px){
    h1{font-size:60px} h2{font-size:36px}
    .panels{grid-template-columns:1fr 1fr 1fr}
    .compare{grid-template-columns:1fr 1fr 1fr}
  }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <img class="logo" src="/orcool-logo.png" alt="Orcool">
    <a class="pill" href="#pilot">Start a pilot</a>
  </div>
</header>
</body>
</html>
